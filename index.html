<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보스 분배금 계산기</title>
    <style>
        :root { --primary: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        
        .header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #eef2f3; padding: 15px; border-radius: 8px; }
        .header-buttons { display: flex; gap: 10px; align-items: center; }
        .party-input { font-size: 1.1rem; font-weight: bold; }
        .party-input input { width: 50px; padding: 5px; border-radius: 4px; border: 1px solid #ccc; text-align: left; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: #f8f9fa; font-weight: 600; }
        
        input[type="text"], input[type="number"] { width: 90%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .method-group { display: flex; gap: 5px; justify-content: center; font-size: 0.85rem; }
        .scissors-group { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        
        .summary-card { background: #2c3e50; color: white; padding: 20px; border-radius: 8px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .summary-item { text-align: center; position: relative; }
        .summary-item label { display: block; font-size: 0.9rem; opacity: 0.8; margin-bottom: 5px; }
        .summary-item span { font-size: 1.3rem; font-weight: bold; }
        
        .btn-mini-copy { background: #f1c40f; color: #2c3e50; border: none; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; cursor: pointer; margin-left: 5px; vertical-align: middle; }
        .btn-mini-copy:hover { background: #f39c12; }

        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; margin-bottom: 10px; }
        .btn-copy { background: #27ae60; color: white; }
        .btn-save { background: #f39c12; color: white; }
        .btn-download { background: #9b59b6; color: white; }
        .btn:hover { opacity: 0.8; }
        
        .delete-row { color: #e74c3c; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>플래닛 보스 분배금 계산기</h1>
    
    <div class="header-controls">
        <div class="party-input">
            파티 인원: <input type="number" id="partyCount" value="3" min="1" oninput="calculate()"> 명
        </div>
        <div class="header-buttons">
            <button class="btn btn-copy" onclick="copyResult()">📋 내역 복사하기</button>
            <button class="btn btn-save" onclick="copyUrl()">🔗 링크 복사</button>
            <button class="btn btn-download" onclick="downloadText()">📥 텍스트로 다운</button>
        </div>
    </div>

    <table id="itemTable">
        <thead>
            <tr>
                <th width="20%">아이템명</th>
                <th width="8%">수량</th>
                <th width="15%">가격(메소)</th>
                <th width="20%">처분 방법</th>
                <th width="15%">가위 공제</th>
                <th width="15%">최종 수령액</th>
                <th width="5%"></th>
            </tr>
        </thead>
        <tbody id="itemBody">
        </tbody>
    </table>

    <button class="btn btn-add" onclick="addRow()">+ 아이템 추가</button>

    <div class="summary-card">
        <div class="summary-item">
            <label>판매 총액</label>
            <span id="totalGross">0</span>
        </div>
        <div class="summary-item">
            <label>수수료 제외 금액</label>
            <span id="totalNet">0</span>
        </div>
        <div class="summary-item">
            <label>1인당 기본 분배금</label>
            <span id="distPerPerson">0</span>
        </div>
        <div class="summary-item" style="color: #f1c40f;">
            <label>택배 보낼 금액(수수료 제외) <button class="btn-mini-copy" onclick="copyDeliveryOnly()">복사</button></label>
            <span id="deliveryAmount">0</span>
        </div>
    </div>
</div>

<script>
// --- 정방향 수수료 계산 ---
function getDeliveryFee(X) {
    if (X <= 0) return 0;
    let fee = 0;
    if (X <= 100000) fee = 10000;
    else if (X <= 1000000) fee = (X - 100000) * 0.008 + 10000;
    else if (X <= 5000000) fee = (X - 1000000) * 0.018 + 17200;
    else if (X <= 10000000) fee = (X - 5000000) * 0.032 + 79200;
    else if (X <= 25000000) fee = (X - 10000000) * 0.040 + 239200;
    else if (X <= 100000000) fee = (X - 25000000) * 0.050 + 839200;
    else fee = (X - 100000000) * 0.060 + 4589200;
    
    return Math.floor(fee); 
}

// --- 발송자가 지불하는 최종 총액 (보내는 돈 + 수수료) ---
function getActualCost(X) {
    if (X <= 0) return 0;
    return X + getDeliveryFee(X);
}

// --- 택배 수수료 역산 로직 (1인당 기본 분배금 target을 맞추기 위해 입력할 원금 X 계산) ---
function getDeliverySendAmount(target) {
    if (target <= 10000) return 0; // 최소 수수료가 1만이므로 1만 메소 이하는 보낼 수 없음
    
    let X = 0;
    // 발송자가 지불하는 총액(X + Fee)을 기준으로 구간(Target 임계점) 재산정
    if (target <= 110000) {
        X = target - 10000;
    } else if (target <= 1017200) {
        X = (target - 9200) / 1.008;
    } else if (target <= 5089200) {
        X = (target + 800) / 1.018;
    } else if (target <= 10239200) {
        X = (target + 80800) / 1.032;
    } else if (target <= 25839200) {
        X = (target + 160800) / 1.040;
    } else if (target <= 104589200) {
        X = (target + 410800) / 1.050;
    } else {
        X = (target + 1410800) / 1.060;
    }
    
    X = Math.floor(X);
    
    // 버림(floor) 처리 및 소수점 오차로 인해 어긋나는 1~2메소 정밀 보정
    while (getActualCost(X) < target) {
        X++;
    }
    while (getActualCost(X) > target) {
        X--;
    }
    
    return X;
}

function parseNumber(str) {
    return parseFloat(str.replace(/,/g, '')) || 0;
}

function formatInputNumber(input) {
    let value = input.value.replace(/[^0-9]/g, '');
    if(value === '') {
        input.value = '0';
    } else {
        input.value = parseInt(value, 10).toLocaleString();
    }
}

// --- UI 제어 로직 ---
function addRow(data = {}) {
    const tbody = document.getElementById('itemBody');
    const row = document.createElement('tr');
    
    const id = Date.now() + Math.random();
    
    const initPrice = (data.price !== undefined) ? parseInt(data.price, 10).toLocaleString() : '0';
    const initScPrice = (data.scPrice !== undefined) ? parseInt(data.scPrice, 10).toLocaleString() : '0';

    row.innerHTML = `
        <td><input type="text" class="item-name" value="${data.name || ''}" oninput="calculate()"></td>
        <td><input type="number" class="item-count" value="${data.count || 1}" oninput="calculate()"></td>
        <td><input type="text" class="item-price" value="${initPrice}" oninput="formatInputNumber(this); calculate();"></td>
        <td>
            <div class="method-group">
                <label><input type="radio" name="method_${id}" value="auction" ${!data.method || data.method==='auction' ? 'checked':''} onchange="calculate()"> 경매장</label>
                <label><input type="radio" name="method_${id}" value="direct" ${data.method==='direct' ? 'checked':''} onchange="calculate()"> 직접입력</label>
            </div>
        </td>
        <td>
            <div class="scissors-group">
                <label><input type="checkbox" class="sc-check" ${data.scUse ? 'checked':''} onchange="calculate()"> 가위사용</label>
                <input type="text" class="sc-price" placeholder="가윗값" value="${initScPrice}" style="display: ${data.scUse ? 'block' : 'none'}" oninput="formatInputNumber(this); calculate();">
            </div>
        </td>
        <td><span class="row-net">0</span></td>
        <td><span class="delete-row" onclick="this.parentElement.parentElement.remove(); calculate();">✕</span></td>
    `;
    tbody.appendChild(row);
    calculate();
}

function calculate() {
    let totalGross = 0;
    let totalNet = 0;
    const rows = document.querySelectorAll('#itemBody tr');
    const partyCount = parseInt(document.getElementById('partyCount').value) || 1;

    rows.forEach(row => {
        const count = parseFloat(row.querySelector('.item-count').value) || 0;
        const price = parseNumber(row.querySelector('.item-price').value);
        const method = row.querySelector('input[type="radio"]:checked').value;
        const scCheck = row.querySelector('.sc-check');
        const scPriceInput = row.querySelector('.sc-price');
        
        scPriceInput.style.display = scCheck.checked ? 'block' : 'none';
        
        let rowGross = price * count;
        let rowNet = 0;

        if (method === 'auction') {
            rowNet = (rowGross > 0) ? (rowGross * 0.9) - 5000 : 0;
        } else {
            rowNet = rowGross;
        }

        if (scCheck.checked) {
            rowNet -= parseNumber(scPriceInput.value);
        }

        rowNet = Math.max(0, Math.floor(rowNet));
        row.querySelector('.row-net').innerText = rowNet.toLocaleString();
        
        totalGross += rowGross;
        totalNet += rowNet;
    });

    const perPerson = Math.floor(totalNet / partyCount);
    
    document.getElementById('totalGross').innerText = Math.floor(totalGross).toLocaleString();
    document.getElementById('totalNet').innerText = totalNet.toLocaleString();
    document.getElementById('distPerPerson').innerText = perPerson.toLocaleString();
    
    // 1인당 기본 분배금(발송자 기준 총액)을 맞추기 위한 실제 입력(전송) 금액 도출
    document.getElementById('deliveryAmount').innerText = getDeliverySendAmount(perPerson).toLocaleString();

    updateUrl();
}

// --- 저장 및 복사 기능 ---
function updateUrl() {
    const data = {
        p: document.getElementById('partyCount').value,
        items: []
    };
    document.querySelectorAll('#itemBody tr').forEach(row => {
        data.items.push({
            name: row.querySelector('.item-name').value,
            count: row.querySelector('.item-count').value,
            price: parseNumber(row.querySelector('.item-price').value),
            method: row.querySelector('input[type="radio"]:checked').value,
            scUse: row.querySelector('.sc-check').checked,
            scPrice: parseNumber(row.querySelector('.sc-price').value)
        });
    });
    window.location.hash = encodeURIComponent(JSON.stringify(data));
}

function loadFromUrl() {
    if (!window.location.hash) {
        for(let i=0; i<7; i++) addRow();
        return;
    }
    try {
        const data = JSON.parse(decodeURIComponent(window.location.hash.substring(1)));
        document.getElementById('partyCount').value = data.p;
        data.items.forEach(item => addRow(item));
    } catch(e) {
        for(let i=0; i<7; i++) addRow();
    }
}

function copyUrl() {
    navigator.clipboard.writeText(window.location.href).then(() => {
        alert("현재 입력된 내역이 포함된 링크가 복사되었습니다!");
    });
}

function copyDeliveryOnly() {
    const deliveryText = document.getElementById('deliveryAmount').innerText;
    const numericValue = deliveryText.replace(/,/g, '');
    
    navigator.clipboard.writeText(numericValue).then(() => {
        alert(`택배 보낼 금액(${deliveryText})이 복사되었습니다! 게임 내 대금 청구/송금에 바로 붙여넣으세요.`);
    });
}

function generateResultText() {
    const now = new Date();
    const dateStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    
    let text = `${dateStr} 플래닛 보스 분배금 내역\n`;
    text += `--------------------------\n`;
    document.querySelectorAll('#itemBody tr').forEach(row => {
        const name = row.querySelector('.item-name').value || "아이템";
        const net = row.querySelector('.row-net').innerText;
        const scCheck = row.querySelector('.sc-check').checked;
        const scPrice = row.querySelector('.sc-price').value;
        
        if(net !== "0") {
            if (scCheck && parseNumber(scPrice) > 0) {
                text += `${name} (가위공제: ${scPrice}): ${net} 메소\n`;
            } else {
                text += `${name}: ${net} 메소\n`;
            }
        }
    });
    text += `--------------------------\n`;
    text += `파티 인원: ${document.getElementById('partyCount').value}명\n`;
    text += `1인당 정산금(분배금): ${document.getElementById('distPerPerson').innerText} 메소\n`;
    text += `실제 택배 송금액(수수료 제외 입력값): ${document.getElementById('deliveryAmount').innerText} 메소\n`;
    return text;
}

function copyResult() {
    const text = generateResultText();
    navigator.clipboard.writeText(text).then(() => alert("내역이 복사되었습니다!"));
}

function downloadText() {
    const now = new Date();
    const YYYY = now.getFullYear();
    const MM = (now.getMonth() + 1).toString().padStart(2, '0');
    const DD = now.getDate().toString().padStart(2, '0');
    const hh = now.getHours().toString().padStart(2, '0');
    const mm = now.getMinutes().toString().padStart(2, '0');
    const ss = now.getSeconds().toString().padStart(2, '0');
    
    const filename = `${YYYY}-${MM}-${DD}-${hh}-${mm}-${ss}보스분배.txt`;
    
    let text = generateResultText();
    text += `--------------------------\n`;
    text += `상세 내역 링크: ${window.location.href}\n`;
    
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8;' });
    const link = document.createElement("a");
    
    if (link.download !== undefined) {
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", filename);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
}

window.onload = loadFromUrl;
</script>

</body>
</html>
